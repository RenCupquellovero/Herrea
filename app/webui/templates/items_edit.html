<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2>Edit Item</h2>

<form method="POST">
    <input class="form-control mb-3" name="name" value="{{ item['name'] }}">
    <input class="form-control mb-3" name="quantity" type="number" value="{{ item['quantity'] }}">
    <textarea class="form-control mb-3" name="notes">{{ item['notes'] }}</textarea>

    <button class="btn btn-warning">Save</button>
</form>

</body>
</html>
