<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        tr.item-row { cursor: pointer; }
        tr.actions-row { display: none; background: #f8f9fa; }
    </style>
</head>

<body class="bg-white p-4">

<h2>Storage</h2>

<a href="/items/add" class="btn btn-primary mb-3">Add Item</a>

<table class="table table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Qty</th>
            <th>Notes</th>
        </tr>
    </thead>

    <tbody>
        {% for item in items %}
        <!-- Clickable row -->
        <tr class="item-row" data-target="actions-{{ item['id'] }}">
            <td>{{ item["id"] }}</td>
            <td>{{ item["name"] }}</td>
            <td>{{ item["quantity"] }}</td>
            <td>{{ item["notes"] }}</td>
        </tr>

        <!-- Hidden actions row -->
        <tr id="actions-{{ item['id'] }}" class="actions-row">
            <td colspan="4">
                <a href="/items/edit/{{ item['id'] }}" class="btn btn-warning me-2">Edit</a>
                <a href="/items/delete/{{ item['id'] }}" class="btn btn-danger">Remove</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
document.querySelectorAll(".item-row").forEach(row => {
    row.addEventListener("click", () => {
        const target = document.getElementById(row.dataset.target);
        target.style.display = target.style.display === "table-row" ? "none" : "table-row";
    });
});
</script>

</body>
</html>
