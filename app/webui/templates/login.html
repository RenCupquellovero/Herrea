<!doctype html>
<html>
    <head>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="{{ url_for('webui.static', filename='style.css') }}"
            rel="stylesheet"
        />
    </head>

    <body
        class="bg-white d-flex justify-content-center align-items-center vh-100"
    >
        <div class="login-box shadow-xxl p-4 rounded-4">
            <h3 class="text-center mb-4">{{ phrase }}</h3>

            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input
                    class="form-control mb-3"
                    name="username"
                    placeholder="Username"
                />
                <input
                    class="form-control mb-3"
                    type="password"
                    name="password"
                    placeholder="Password"
                />
                <button class="btn btn-primary w-100">Login</button>
            </form>
        </div>

        <div class="footer text-center text-muted mt-4">
            {{ version }} ·
            <a href="https://github.com/RenCup/Herrea" target="_blank">
                <img
                    src="{{ url_for('webui.static', filename='github.svg') }}"
                    height="14"
                />
                Github
            </a>
        </div>
    </body>
</html>
